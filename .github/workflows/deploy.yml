name: Deploy Focus HUD

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Oracle VPS
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -euo pipefail

            cd ${{ secrets.APP_DIR }}

            echo "🔄 Sync repository with origin/main..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "🐳 Build and restart container..."
            docker compose up -d --build --remove-orphans

            echo "🧹 Prune unused Docker images..."
            docker image prune -f

            echo "❤️ Waiting for health check..."
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
                echo "✅ App is healthy"
                docker ps --filter "name=focus-hud"
                exit 0
              fi

              echo "Waiting for app... attempt $i/20"
              sleep 3
            done

            echo "❌ App did not become healthy"
            docker logs --tail=80 focus-hud
            exit 1